name: build-runner

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jinxit/agents-runner
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Log WoW build number
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          SHA_TAG=$(echo "$TAGS" | grep "sha-" | head -1)
          docker pull "$SHA_TAG"
          {
            echo "## WoW Client Build"
            echo '```'
            docker run --rm "$SHA_TAG" cat /opt/wowless/products/wow/WowlessData/build.lua
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update fleet runner image
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          AGENTS_API_URL: ${{ secrets.AGENTS_API_URL }}
          AGENTS_API_TOKEN: ${{ secrets.AGENTS_API_TOKEN }}
        run: |
          SHA_TAG=$(echo "$TAGS" | grep "sha-" | head -1)
          if [ -z "$AGENTS_API_URL" ] || [ -z "$AGENTS_API_TOKEN" ]; then
            echo "::warning::AGENTS_API_URL or AGENTS_API_TOKEN not set, skipping fleet update"
            exit 0
          fi
          for workspace in arcui infra; do
            echo "Updating workspace '$workspace' to $SHA_TAG"
            curl -sf --max-time 10 \
              -X PATCH \
              -H "Authorization: Bearer $AGENTS_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"runner_image\": \"$SHA_TAG\"}" \
              "$AGENTS_API_URL/workspaces/$workspace/runtime" \
            && echo " ✓ $workspace updated" \
            || echo "::warning::Failed to update workspace '$workspace'"
          done
